spring:
  application:
    name: billing-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/billing_service}
    username: ${DB_USER:mecanica}
    password: ${DB_PASS:mecanica}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret-key: ${SECURITY_JWT_SECRET_KEY:ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-placeholder-token}

seeding:
  enabled: ${SEEDING_ENABLED:true}

mecanica:
  orcamento:
    taxa-impostos: ${TAXA_IMPOSTOS:0.05}
    validade-dias: ${ORCAMENTO_VALIDADE_DIAS:30}
